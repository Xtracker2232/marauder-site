<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marauder - Recherche CSINT</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glitch-overlay"></div>
    
    <header>
        <div class="header-content">
            <div class="logo-container">
                <img src="https://cdn.discordapp.com/attachments/1477415267452719208/1526218620164636742/image.png?ex=6a56395a&is=6a54e7da&hm=5758e229ea864bcac4d7fcc7d6512c200ffcf7f8a16f90517d9b289c8a683816&" alt="Marauder" class="logo-small">
                <span class="logo-text">MARAUDER</span>
            </div>
            <div class="header-status">
                <span class="status-dot"></span>
                <span class="status-text">SYSTEME OPERATIONNEL</span>
            </div>
        </div>
    </header>

    <main>
        <div class="search-container">
            <div class="brand">
                <img src="https://cdn.discordapp.com/attachments/1477415267452719208/1526218620164636742/image.png?ex=6a56395a&is=6a54e7da&hm=5758e229ea864bcac4d7fcc7d6512c200ffcf7f8a16f90517d9b289c8a683816&" alt="Marauder" class="logo-large">
                <h1>MARAUDER</h1>
                <p class="subtitle">// OSINT &amp; CSINT // ACCES DIRECT //</p>
                <div class="terminal-line">$ _</div>
            </div>
            
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder=">_ Rechercher un nom, email, téléphone...">
                <button id="searchButton">▶ EXECUTER</button>
                <button id="clearButton" class="clear-btn">✕ EFFACER</button>
            </div>
            
            <div id="results"></div>
        </div>
    </main>

    <footer>
        <p>© 2026 MARAUDER // PROPUISÉ PAR BRIXHUB // v3.1.0</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marauder - Recherche CSINT</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="URL_DU_LOGO">
</head>
<body>
    <header>
        <div class="header-content">
            <img src="URL_DU_LOGO_EN_PETIT" alt="Marauder" class="logo-small">
            <h1>Marauder</h1>
        </div>
    </header>

    <main>
        <div class="search-container">
            <img src="URL_DU_LOGO_EN_GRAND" alt="Marauder" class="logo-large">
            <h2>Recherche CSINT</h2>
            <p class="subtitle">Aucune connexion requise. Recherche instantanée.</p>
            
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Nom, email, téléphone...">
                <button id="searchButton">🔍 Rechercher</button>
            </div>
            
            <div id="results"></div>
        </div>
    </main>

    <footer>
        <p>Propulsé par l'API BrixHub © 2026 Marauder</p>
    </footer>

    <script src="script.js"></script>

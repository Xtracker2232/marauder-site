<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Marauder</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🔍%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-overlay"></div>
    
    <header>
        <div class="header-content">
            <div class="logo-container">
                <div class="radar">
                    <div class="radar-ring"></div>
                    <div class="radar-ring"></div>
                    <div class="radar-ring"></div>
                    <div class="radar-sweep"></div>
                    <div class="radar-dot"></div>
                </div>
                <span class="logo-text">MARAUDER</span>
            </div>
            <div class="header-status">
                <span class="status-dot"></span>
                <span class="status-text">ONLINE</span>
            </div>
        </div>
    </header>

    <main>
        <div class="search-container">
            <div class="brand">
                <svg class="logo-center" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="100" cy="100" r="90" stroke="#4a7abf" stroke-width="2" opacity="0.3"/>
                    <circle cx="100" cy="100" r="70" stroke="#4a7abf" stroke-width="1.5" opacity="0.2"/>
                    <circle cx="100" cy="100" r="50" stroke="#4a7abf" stroke-width="1" opacity="0.15"/>
                    <circle cx="100" cy="100" r="30" stroke="#4a7abf" stroke-width="0.5" opacity="0.1"/>
                    <line x1="100" y1="100" x2="180" y2="100" stroke="#4a7abf" stroke-width="2" opacity="0.6">
                        <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="4s" repeatCount="indefinite"/>
                    </line>
                    <circle cx="100" cy="100" r="6" fill="#4a7abf" opacity="0.8">
                        <animate attributeName="r" values="4;8;4" dur="2s" repeatCount="indefinite"/>
                        <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="60" cy="60" r="4" fill="#4a7abf" opacity="0.4">
                        <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="140" cy="70" r="3" fill="#4a7abf" opacity="0.3">
                        <animate attributeName="opacity" values="0.1;0.5;0.1" dur="2.5s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="80" cy="150" r="3" fill="#4a7abf" opacity="0.3">
                        <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3.5s" repeatCount="indefinite"/>
                    </circle>
                    <text x="100" y="185" text-anchor="middle" fill="#4a7abf" font-family="'Share Tech Mono', monospace" font-size="18" opacity="0.4">M</text>
                </svg>
                <h1>MARAUDER</h1>
                <p class="subtitle">// RECHERCHE OSINT //</p>
            </div>
            
            <div class="search-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>NOM</label>
                        <input type="text" id="nom" placeholder="Dupont">
                    </div>
                    <div class="form-group">
                        <label>PRÉNOM</label>
                        <input type="text" id="prenom" placeholder="Jean">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>VILLE</label>
                        <input type="text" id="ville" placeholder="Paris">
                    </div>
                    <div class="form-group">
                        <label>CODE POSTAL</label>
                        <input type="text" id="code_postal" placeholder="75001">
                    </div>
                    <div class="form-group">
                        <label>ADRESSE</label>
                        <input type="text" id="adresse" placeholder="10 rue de la Paix">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>EMAIL</label>
                        <input type="text" id="email" placeholder="jean@example.com">
                    </div>
                    <div class="form-group">
                        <label>TÉLÉPHONE</label>
                        <input type="text" id="telephone" placeholder="0612345678">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>DATE NAISSANCE</label>
                        <input type="text" id="date_naissance" placeholder="1990-06-15">
                    </div>
                    <div class="form-group">
                        <label>NOM NAISSANCE</label>
                        <input type="text" id="nom_naissance" placeholder="Martin">
                    </div>
                    <div class="form-group">
                        <label>GENRE</label>
                        <input type="text" id="genre" placeholder="M/F">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>NIR (SÉCU)</label>
                        <input type="text" id="nir" placeholder="1234567890123">
                    </div>
                    <div class="form-group">
                        <label>IBAN</label>
                        <input type="text" id="iban" placeholder="FR76...">
                    </div>
                    <div class="form-group">
                        <label>SIRET</label>
                        <input type="text" id="siret" placeholder="12345678901234">
                    </div>
                </div>

                <div class="form-actions">
                    <button id="searchButton" class="search-btn">▶ RECHERCHER</button>
                    <button id="clearButton" class="clear-btn">✕ EFFACER</button>
                </div>
            </div>
            
            <div id="results"></div>
        </div>
    </main>

    <footer>
        <p>CREATED BY INDEX © 2026</p>
        <p class="license">MIT License - Open Source</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
